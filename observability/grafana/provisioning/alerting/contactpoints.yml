apiVersion: 1

contactPoints:
  - orgId: 1
    name: freightops-incident-webhook
    receivers:
      - uid: frt-webhook-portal
        type: webhook
        settings:
          url: http://portal-app:8080/grafana-webhook
          httpMethod: POST
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: freightops-incident-webhook
    group_by: ["alertname"]
    group_wait: 10s
    group_interval: 1m
    repeat_interval: 4h

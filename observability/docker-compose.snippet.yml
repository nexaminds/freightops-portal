# FreightOps observability — DATADOG ONLY.
#   docker compose -f observability/docker-compose.snippet.yml up -d --remove-orphans
#
# Services:
#   portal-app    →  http://localhost:8080         (the TMS app)
#   datadog-agent →  scrapes portal-app:8080/metrics (OpenMetrics) + collects
#                    container logs + APM → ${DD_SITE} (set DD_API_KEY in .env)
#
# Prometheus / Grafana / Loki / Promtail were removed — Datadog is the sole
# observability backend (metrics, logs, traces). The monitor that drives the
# NexAI incident pipeline is Datadog monitor "FreightOps · Load Validation
# Failure Rate > 10%" (grouped by error_code).

networks:
  freightops:
    driver: bridge

services:

  portal-app:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "cd metrics-server && npm install --prefer-offline --silent && cd .. && node metrics-server/server.js"]
    volumes:
      - type: bind
        source: ../
        target: /app
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      STATIC_DIR: "/app/public"
      APP_NAME: "freightops-portal"
      APP_ENV:  "prod"
      DD_ENV: "prod"
      DD_SERVICE: "freightops-portal"
      DD_VERSION: "1.0.0"
      DD_AGENT_HOST: "datadog-agent"
    networks:
      - freightops
    logging:
      driver: json-file
      options:
        tag: "{{.Name}}"
    labels:
      env: prod
      app: freightops-portal
      com.datadoghq.ad.logs: '[{"source":"nodejs","service":"freightops-portal"}]'

  # Datadog Agent — scrapes portal-app:8080/metrics via the OpenMetrics check
  # (datadog/openmetrics.yaml), collects container logs, and ships to ${DD_SITE}.
  datadog-agent:
    image: registry.datadoghq.com/agent:7
    environment:
      DD_API_KEY: "${DD_API_KEY:?set DD_API_KEY in observability/.env}"
      DD_SITE: "${DD_SITE:-us5.datadoghq.com}"
      DD_ENV: "prod"
      DD_HOSTNAME: "freightops-local"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_PROCESS_AGENT_ENABLED: "true"
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - ./datadog/openmetrics.yaml:/etc/datadog-agent/conf.d/openmetrics.d/conf.yaml:ro
    depends_on:
      - portal-app
    networks:
      - freightops
    labels:
      app: datadog-agent

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: prod

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers: []   # webhook fired directly from Grafana

scrape_configs:
  - job_name: freightops-portal
    static_configs:
      - targets: ["portal-app:8080"]
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 4s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
